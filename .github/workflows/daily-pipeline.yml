# Production run of the RemoteRadar ETL: GitHub Actions is the scheduler,
# Prefect Cloud is the observability layer.
#
# Each run executes the `remoteradar-etl` flow exactly once (no --serve, no
# long-lived process): extract+load the three sources, dbt run, Great
# Expectations checks. With PREFECT_API_URL + PREFECT_API_KEY set, the run is
# reported to Prefect Cloud (logs, task retries, duration) — but the schedule
# below is what actually triggers it; no machine stays on between runs.
#
# A failed flow raises out of the `remoteradar-flow` entry point, so the step
# exits non-zero and the workflow run is marked failed — watch the Actions tab
# (GitHub also emails the repo owner on scheduled-workflow failures by default).

name: Daily pipeline

on:
  schedule:
    # 09:00 UTC = 06:00 America/Sao_Paulo (fixed UTC-3, Brazil has no DST) —
    # the same local time as the Phase 5 serve() cron, kept for consistency.
    # GitHub cron is UTC-only and may start a few minutes late under load.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

# A run that overlaps a previous one would race it on the same warehouse;
# queue instead (never cancel a production run mid-flight).
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Same version as CI and local development (see ci.yml).
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the package with dev dependencies
        # The dev extra is required here, not just for CI: it provides
        # dbt-core/dbt-postgres, which the flow's run_dbt_models task shells
        # out to.
        run: python -m pip install -e ".[dev]"

      - name: Run the remoteradar-etl flow once
        env:
          # Warehouse (extraction load + quality checks)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Adzuna API credentials
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          # dbt connection (same warehouse as DATABASE_URL, split into
          # components — dbt-postgres does not take a connection string)
          DBT_PG_HOST: ${{ secrets.DBT_PG_HOST }}
          DBT_PG_PORT: ${{ secrets.DBT_PG_PORT }}
          DBT_PG_USER: ${{ secrets.DBT_PG_USER }}
          DBT_PG_PASSWORD: ${{ secrets.DBT_PG_PASSWORD }}
          DBT_PG_DBNAME: ${{ secrets.DBT_PG_DBNAME }}
          DBT_PG_SCHEMA: ${{ secrets.DBT_PG_SCHEMA }}
          # Prefect Cloud, non-interactive: these two env vars replace
          # `prefect cloud login` entirely. PREFECT_API_URL format:
          # https://api.prefect.cloud/api/accounts/<ACCOUNT_ID>/workspaces/<WORKSPACE_ID>
          PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
          PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
          # Keep tool telemetry out of production runs
          DBT_SEND_ANONYMOUS_USAGE_STATS: "false"
          GX_ANALYTICS_ENABLED: "false"
        run: remoteradar-flow
