# dbt project for RemoteRadar transformations.
# Run dbt commands from this directory (transform/) so dbt picks up the
# repo-local profiles.yml automatically.

name: remoteradar
version: "0.1.0"
config-version: 2

profile: remoteradar

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages

models:
  remoteradar:
    staging:
      # Staging stays as views: it is a thin JSONB-parsing layer over the raw
      # tables, and views keep it always in sync with the latest ingestions.
      +materialized: view

seeds:
  remoteradar:
    exchange_rates:
      +column_types:
        country_code: varchar(2)
        currency_code: varchar(3)
        usd_rate: numeric
        captured_at: date
